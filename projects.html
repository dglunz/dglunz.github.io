---
layout: default
title: 
permalink: /projects/
---

<div class="home">
  <div class="posts projects">
    {% for project in site.projects %}
    <div class="post">
      <div class="center">
        <div class="project-header">
          {% if project.gif %}
          <a class="project-gif" href="{{ project.gif }}" ></a>
          {% endif %}
          <h3 class="h2 post-title">{{ project.title }}</h3>
          <p class="post-summary">
          {{ project.summary }}
          </p>
          <p class="project-links">
          <a href="{{ project.code }}"><i class="fa fa-code"></i></a>
          {% if project.live %}
          <a href="{{ project.live }}"><i class="fa fa-eye"></i></a>
          {% endif %}
          <p>
        </div>
      </div>
      <div class="project-body">
        <h3>Toolstack</h3>
        <p>{{ project.tools }}</p>
        <h3>Focus</h3>
        <p>{{ project.content }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script src="http://cdn.embed.ly/jquery.embedly-3.1.1.min.js" type="text/javascript"></script>
<script src="../assets/js/projects.js" type="text/javascript" charset="utf-8"> </script>
