---
layout: default
title: 
permalink: /projects/
---

<div class="home">
  <div class="posts">
    {% for project in site.projects %}
    <div class="post">
      <h3 class="h2 post-title">{{ project.title }}
        {% if project.live %}
        <span class="project-link">|
          <a href="{{ project.live }}">{{ project.live_slug }}</a>
        </span>
        {% endif %}
      </h3>
      <p class="post-summary">
      {{ project.summary }}
      </p>
      <h3>Toolstack</h3>
      <p>{{ project.tools }}</p>
      <h3>Focus</h3>
      <p>{{ project.content }}</p>
      <p><a href="{{ project.code }}">code <i class="fa fa-code"></i></a><p>
    </div>
    {% endfor %}
  </div>
